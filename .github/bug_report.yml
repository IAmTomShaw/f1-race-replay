name: 🐛 Bug Report
description: Something isn't working right? Let us know.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill this out as completely as you can.
        
        > **Before filing:** Check [open issues](https://github.com/thealxlabs/f1-race-replay/issues) to avoid duplicates.
        > The leaderboard being slightly off in the first few corners or during pit stops is a **known issue** — no need to report that one.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "e.g. The replay crashes when I select Round 5 with the --qualifying flag"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How do we reproduce this? Be as specific as possible.
      placeholder: |
        1. Run `python main.py --viewer --year 2024 --round 5 --qualifying`
        2. Wait for data to load
        3. Press play
        4. App crashes at lap 3
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "e.g. The qualifying session replay should play without crashing"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      placeholder: "e.g. The window closed with an error in the terminal"
    validations:
      required: true

  - type: textarea
    id: terminal
    attributes:
      label: Terminal output / error message
      description: Paste any error output here. This is extremely helpful.
      render: shell

  - type: input
    id: year_round
    attributes:
      label: Affected race / session
      description: Which year, round, and session type were you using?
      placeholder: "e.g. 2024 Round 5, Race / 2025 Round 12, Qualifying"

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.4"
    validations:
      required: true

  - type: textarea
    id: packages
    attributes:
      label: Relevant package versions
      description: Run `pip show fastf1 arcade PySide6` and paste the output here.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: If applicable, drag and drop images here.

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have included steps to reproduce the bug
          required: true
        - label: I am using the latest version of the repo
          required: false
